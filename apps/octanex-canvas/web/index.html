<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OctaneX Agentic Canvas</title>
  <link rel="stylesheet" href="app.css?v=3" />
</head>
<body>
  <!-- Full-bleed viewport: the render owns the screen -->
  <div id="viewport">
    <!-- WebGL live layer (three.js) — primary canvas tier -->
    <canvas id="webgl-canvas"></canvas>
    <!-- Octane final-render overlay (optional quality tier) -->
    <img id="preview" alt="Octane render preview" />
    <div id="placeholder">no frame yet — type an intent or open ⌘K</div>
    <!-- View-mode toggle: Live (WebGL) / Final (Octane PNG) / Split -->
    <div id="viewmodes">
      <button data-mode="live" class="active">Live</button>
      <button data-mode="final">Final</button>
      <button data-mode="split">Split</button>
    </div>
  </div>

  <!-- Command bar (⌘↵ submits) -->
  <div id="cmdbar">
    <button id="vox-toggle" title="VOX voice mode (terse conversation contract)" aria-pressed="false">VOX</button>
    <button id="snap-toggle" title="Send a screenshot of the viewport to the agent for vision analysis" aria-pressed="false">⎙</button>
    <span id="sel-chip" class="hidden" title="selected object — click to reference it in your message"></span>
    <input id="cmd" type="text" placeholder="discuss the design, or 'visualise …' / ⌘K to build…" autocomplete="off" spellcheck="false" />
    <button id="log-toggle" title="Show/hide the agent transcript">LOG</button>
  </div>
  <div id="response" class="hidden"></div>

  <!-- Active task tray: cancellable in-flight processes (chat / build) -->
  <div id="tasks"></div>

  <!-- Agent transcript overlay (toggled by LOG) -->
  <div id="transcript" class="hidden">
    <header><span>Agent transcript</span><button id="transcript-close">✕</button></header>
    <div id="transcript-body"></div>
  </div>

  <!-- Status pill (truthful live state from status.json + interpreted intent) -->
  <div id="status" class="state-idle">
    <span class="status-dots">
      <span id="dot-front" class="sdot" title="frontend (canvas) activity"></span>
      <span id="dot-back" class="sdot" title="backend (gateway/agent) activity"></span>
    </span>
    <span id="status-text">idle</span>
  </div>

  <!-- ⌘K command palette -->
  <div id="palette" class="hidden">
    <input id="palette-input" type="text" placeholder="filter recipes / tools…" autocomplete="off" />
    <ul id="palette-list"></ul>
  </div>

  <!-- ⌘I inspector drawer -->
  <aside id="inspector" class="hidden">
    <header><span>Inspector</span><button id="inspector-close">✕</button></header>
    <section id="inspector-selection"><em>click an object in the scene to edit it</em></section>
    <section id="inspector-review"><em>open to review the latest preview</em></section>
    <section id="inspector-controls">
      <label>Camera distance
        <input id="cam-dist" type="range" min="0.4" max="3.0" step="0.05" value="1.0" />
      </label>
      <div id="inspector-fixes"></div>
    </section>
  </aside>

  <div id="model-selector">
    <label for="model-select">agent</label>
    <select id="model-select"></select>
  </div>

  <script type="module" src="app.js?v=3"></script>
</body>
</html>
