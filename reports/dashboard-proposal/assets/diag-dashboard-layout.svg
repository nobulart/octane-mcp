<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#05070a"/><stop offset="1" stop-color="#0a0f15"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e2030"/><stop offset="0.5" stop-color="#13303f"/><stop offset="1" stop-color="#1a2230"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#101820"/><stop offset="1" stop-color="#16222c"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#35e0d8"/><stop offset="1" stop-color="#2fd4ff"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6"><stop offset="0" stop-color="#2a4a5e" stop-opacity="0.9"/><stop offset="1" stop-color="#0a0f15" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg3)"/>

  <!-- canvas / render surface (Octane clutter-free viewport) -->
  <rect x="20" y="20" width="1160" height="620" rx="16" fill="url(#scene)"/>
  <rect x="20" y="20" width="1160" height="620" rx="16" fill="url(#glow)"/>
  <!-- suggested subject: math surface rendered fill -->
  <g opacity="0.5" filter="url(#soft)">
    <ellipse cx="600" cy="330" rx="360" ry="200" fill="#1d4a5e" opacity="0.5"/>
    <ellipse cx="600" cy="300" rx="250" ry="120" fill="#2c6f80" opacity="0.35"/>
  </g>
  <text x="600" y="46" fill="#cfe6ee" font-size="13" text-anchor="middle" opacity="0.7">Octane X — clutter-free presentation viewport (render fills the frame)</text>

  <!-- top-left: intent cluster (minimal) -->
  <g>
    <rect x="40" y="44" width="250" height="40" rx="20" fill="#0c1318" stroke="#243441" opacity="0.92"/>
    <circle cx="66" cy="64" r="6" fill="url(#acc)"/>
    <text x="84" y="69" fill="#cfe0e8" font-size="13">Intent · <tspan fill="#8aa0ad">visualize Titan atmosphere scan</tspan></text>
  </g>
  <!-- top-right: status cluster -->
  <g>
    <rect x="910" y="44" width="250" height="40" rx="20" fill="#0c1318" stroke="#243441" opacity="0.92"/>
    <circle cx="936" cy="64" r="6" fill="#5bd0a0"/>
    <text x="954" y="69" fill="#cfe0e8" font-size="12.5">Render ready · 128 spp</text>
    <text x="1100" y="69" fill="#7d8c99" font-size="12">⌘K</text>
  </g>

  <!-- bottom command bar (the one persistent control) -->
  <g>
    <rect x="320" y="600" width="560" height="56" rx="28" fill="url(#bar)" stroke="#2a3a47"/>
    <rect x="320" y="600" width="560" height="56" rx="28" fill="none" stroke="#35e0d8" stroke-opacity="0.25"/>
    <text x="352" y="635" fill="#9fb2bd" font-size="14">⌘K  “show me the orbital decay as a timeline…”</text>
    <rect x="804" y="612" width="60" height="32" rx="16" fill="url(#acc)"/>
    <text x="834" y="633" fill="#03141a" font-size="13" font-weight="700" text-anchor="middle">Build</text>
  </g>

  <!-- floating context chip (left, appears on demand) -->
  <g opacity="0.95">
    <rect x="40" y="540" width="180" height="64" rx="12" fill="#0c1318" stroke="#243441" opacity="0.9"/>
    <text x="56" y="564" fill="#8aa0ad" font-size="11">SCENE</text>
    <text x="56" y="584" fill="#eaf2f6" font-size="13" font-weight="600">atmosphere_007</text>
    <text x="56" y="600" fill="#6fd6c9" font-size="10.5">● 3 objects · 2 lights</text>
  </g>

  <!-- annotation callouts -->
  <g stroke="#3a4a57" stroke-width="1" fill="none">
    <path d="M40,84 C20,84 20,110 40,118" />
  </g>
  <text x="44" y="540" fill="#5b6b78" font-size="11">▸ context appears only on hover / focus</text>
  <text x="600" y="688" fill="#5b6b78" font-size="12" text-anchor="middle">One persistent control: the command bar. Everything else is reveal-on-demand. (⌘K palette, ⌘I inspector, ~ to toggle clutter-free)</text>

  <!-- legend -->
  <g transform="translate(40,664)">
    <circle cx="6" cy="-4" r="5" fill="url(#acc)"/><text x="18" y="0" fill="#7d8c99" font-size="11">intent / live</text>
    <circle cx="120" cy="-4" r="5" fill="#5bd0a0"/><text x="132" y="0" fill="#7d8c99" font-size="11">render healthy</text>
  </g>
</svg>
