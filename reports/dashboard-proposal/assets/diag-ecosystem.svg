<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e13"/><stop offset="1" stop-color="#0d1218"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2fd4ff"/><stop offset="1" stop-color="#35e0d8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb347"/><stop offset="1" stop-color="#ff8a5b"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#5b6b78"/>
    </marker>
    <marker id="arrC" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#35e0d8"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <!-- title -->
  <text x="40" y="46" fill="#eaf2f6" font-size="22" font-weight="700">OctaneX Agentic Ecosystem — Current Architecture</text>
  <text x="40" y="70" fill="#7d8c99" font-size="13">Intent → tool calls → allowlisted command queue → Lua bridge → native render → vision review → loop</text>

  <!-- Human -->
  <g>
    <rect x="40" y="300" width="150" height="120" rx="12" fill="#10161d" stroke="#23303a"/>
    <text x="115" y="345" fill="#eaf2f6" font-size="15" font-weight="600" text-anchor="middle">Human</text>
    <text x="115" y="368" fill="#7d8c99" font-size="11" text-anchor="middle">natural-language</text>
    <text x="115" y="384" fill="#7d8c99" font-size="11" text-anchor="middle">intent / correction</text>
    <text x="115" y="400" fill="#7d8c99" font-size="11" text-anchor="middle">gesture / voice</text>
  </g>

  <!-- Hermes agent -->
  <g>
    <rect x="250" y="120" width="180" height="300" rx="12" fill="#10161d" stroke="#23303a"/>
    <rect x="250" y="120" width="180" height="34" rx="12" fill="#15202b"/>
    <text x="340" y="143" fill="url(#cyan)" font-size="14" font-weight="700" text-anchor="middle">Hermes Agent</text>
    <text x="340" y="186" fill="#cdd9e1" font-size="11.5" text-anchor="middle">reasoning + planning</text>
    <text x="340" y="204" fill="#cdd9e1" font-size="11.5" text-anchor="middle">recipe book (self-improving)</text>
    <text x="340" y="222" fill="#cdd9e1" font-size="11.5" text-anchor="middle">local vision review</text>
    <text x="340" y="240" fill="#cdd9e1" font-size="11.5" text-anchor="middle">(glm-ocr)</text>
    <text x="340" y="266" fill="#8aa0ad" font-size="11" text-anchor="middle">— MCP tool calls —</text>
    <text x="340" y="290" fill="#9fb2bd" font-size="10.5" text-anchor="middle">build_scene · visualize_*</text>
    <text x="340" y="308" fill="#9fb2bd" font-size="10.5" text-anchor="middle">set_camera · set_lighting</text>
    <text x="340" y="326" fill="#9fb2bd" font-size="10.5" text-anchor="middle">create_material · create_light</text>
    <text x="340" y="344" fill="#9fb2bd" font-size="10.5" text-anchor="middle">save_preview · review_preview</text>
    <text x="340" y="370" fill="#ffb347" font-size="10.5" text-anchor="middle">⤺ render-review loop</text>
  </g>

  <!-- MCP server -->
  <g>
    <rect x="500" y="190" width="180" height="150" rx="12" fill="#0f1a1f" stroke="#1f3b3d"/>
    <text x="590" y="218" fill="url(#cyan)" font-size="14" font-weight="700" text-anchor="middle">octanex-mcp</text>
    <text x="590" y="240" fill="#9fb2bd" font-size="11" text-anchor="middle">FastMCP stdio server</text>
    <text x="590" y="260" fill="#9fb2bd" font-size="10.5" text-anchor="middle">validate schema</text>
    <text x="590" y="278" fill="#9fb2bd" font-size="10.5" text-anchor="middle">write JSON command</text>
    <text x="590" y="296" fill="#9fb2bd" font-size="10.5" text-anchor="middle">scene manifests</text>
    <text x="590" y="318" fill="#7d8c99" font-size="10" text-anchor="middle">lightweight (mcp only)</text>
  </g>

  <!-- Queue -->
  <g>
    <rect x="740" y="250" width="150" height="70" rx="10" fill="#141014" stroke="#3a2a1f"/>
    <text x="815" y="278" fill="url(#gold)" font-size="13" font-weight="700" text-anchor="middle">Command Queue</text>
    <text x="815" y="298" fill="#b9a48f" font-size="10.5" text-anchor="middle">queue → processing</text>
    <text x="815" y="312" fill="#b9a48f" font-size="10.5" text-anchor="middle">→ processed / failed</text>
  </g>

  <!-- Lua bridge -->
  <g>
    <rect x="740" y="350" width="150" height="70" rx="10" fill="#10161d" stroke="#23303a"/>
    <text x="815" y="378" fill="#eaf2f6" font-size="13" font-weight="700" text-anchor="middle">Lua Bridge</text>
    <text x="815" y="398" fill="#9fb2bd" font-size="10.5" text-anchor="middle">allowlisted DSL</text>
    <text x="815" y="412" fill="#9fb2bd" font-size="10.5" text-anchor="middle">no arbitrary Lua</text>
  </g>

  <!-- Octane -->
  <g>
    <rect x="960" y="150" width="200" height="200" rx="14" fill="#0c1118" stroke="#2a3a47"/>
    <rect x="960" y="150" width="200" height="34" rx="14" fill="#142231"/>
    <text x="1060" y="173" fill="url(#cyan)" font-size="14" font-weight="700" text-anchor="middle">Octane X</text>
    <text x="1060" y="212" fill="#cdd9e1" font-size="11.5" text-anchor="middle">GPU photoreal renderer</text>
    <text x="1060" y="230" fill="#9fb2bd" font-size="10.5" text-anchor="middle">mesh · material · light</text>
    <text x="1060" y="248" fill="#9fb2bd" font-size="10.5" text-anchor="middle">camera · render target</text>
    <text x="1060" y="274" fill="#7d8c99" font-size="10" text-anchor="middle">— shared canvas —</text>
    <text x="1060" y="300" fill="#9fb2bd" font-size="10.5" text-anchor="middle">native preview PNG</text>
    <text x="1060" y="320" fill="#9fb2bd" font-size="10.5" text-anchor="middle">clutter-free mode</text>
  </g>

  <!-- arrows -->
  <line x1="190" y1="360" x2="248" y2="300" stroke="#5b6b78" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="430" y1="270" x2="498" y2="258" stroke="url(#cyan)" stroke-width="2.5" marker-end="url(#arrC)"/>
  <line x1="680" y1="262" x2="738" y2="278" stroke="url(#gold)" stroke-width="2.5" marker-end="url(#arrC)"/>
  <line x1="815" y1="320" x2="815" y2="348" stroke="#5b6b78" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="890" y1="385" x2="958" y2="290" stroke="#5b6b78" stroke-width="2" marker-end="url(#arr)"/>
  <!-- preview flows back to vision review -->
  <path d="M960,360 C820,470 420,470 320,425" fill="none" stroke="url(#cyan)" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrC)"/>
  <text x="640" y="468" fill="#5fd6c9" font-size="11" text-anchor="middle">preview.png → Hermes vision review → next patch</text>
</svg>
